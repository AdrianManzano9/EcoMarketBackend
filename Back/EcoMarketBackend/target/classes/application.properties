spring.application.name=demo

# 1. URL de conexión a la base de datos 
spring.datasource.url=jdbc:mysql://localhost:3306/ecomarketdb?serverTimezone=UTC&useSSL=false

# 2. Credenciales de MySQL local
spring.datasource.username=root
spring.datasource.password=

# 3. Driver de MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 4. Configuración de JPA / Hibernate
# 'update' crea las tablas automáticamente si no existen, o las actualiza si agregas atributos
spring.jpa.hibernate.ddl-auto=update

# Muestra en la consola de VS Code las consultas SQL reales que Spring hace de fondo
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true